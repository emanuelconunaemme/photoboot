name: Photoboot
options:
  bundleIdPrefix: xyz.saga.photoboot
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: en
  groupSortPosition: top
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.10"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
    TARGETED_DEVICE_FAMILY: "2"          # iPad only
    SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: "NO"
    SUPPORTS_XR_DESIGNED_FOR_IPHONE_IPAD: "NO"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
    GENERATE_INFOPLIST_FILE: "NO"        # we ship our own Info.plist
    INFOPLIST_FILE: "Photoboot/Info.plist"
    CODE_SIGN_STYLE: "Automatic"
    # DEVELOPMENT_TEAM intentionally left unset — Xcode picks the user's free
    # Apple ID team on first build. Set this if you upgrade to a paid account.

packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: "2.24.0"

targets:
  Photoboot:
    type: application
    platform: iOS
    sources:
      - path: Photoboot
        excludes:
          - "Info.plist"
    resources:
      - Photoboot/Info.plist
    dependencies:
      - package: Supabase
        product: Supabase
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: xyz.saga.photoboot
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
